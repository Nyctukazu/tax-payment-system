<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Client Login</title>
        <link rel="stylesheet" href="/css/main.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

        <script src="https://accounts.google.com/gsi/client" async defer></script>
    </head>
    <body class="client-login-body">

    <start-header></start-header>

    <div class="particle-container" id="particle-canvas"></div>

    <div class="client-login-container">
        <div class="login-card">
            <div class="logo-wrapper">
                <img class="logo-image" src="images/logo.jpg" alt="Company Logo">
            </div>

            <h2>Login as User</h2>
            <p class="instruction-text">Enter your username and password to login</p>

            <div class="error-banner hidden">
                Invalid username and / or password.<br>Please try again.
            </div>

                <form id="login-form" action="#" method="POST">
                    <div class="form-group">
                        <input id="user-email-login" name="user_email_login" type="email" placeholder="Email" required autocomplete="email">
                    </div>

                <div class="form-group">
                    <input id="user-password-login" name="user_password_login" type="password" placeholder="Password" required autocomplete="current-password">
                    <div class="forgot-link-container">
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>
                </div>

                    <button id="login-submit-btn" type="submit" class="global-btn">Login</button>
                </form>

            <div class="divider">Or login with</div>

                <div id="g_id_onload"
                    data-client_id="139040312423-lu1g1apc9b60flr8ii1ia453mkpp5ik8.apps.googleusercontent.com"
                    data-context="signin"
                    data-ux_mode="popup"
                    data-callback="handleGoogleSignInResponse"
                    data-auto_prompt="false"
                    data-use_fedcm_for_prompt="false">
                </div>

                <div class="g_id_signin"
                    data-type="standard"
                    data-shape="rectangular"
                    data-theme="outline"
                    data-size="large"
                    data-text="signin_with"
                    data-width="272"
                    style="display: flex; justify-content: center; margin-top: 15px;">
                </div>

                <p class="signup-prompt">Don't have an account? <a href="#">Register</a></p>
            </div>
        </div>
        <script type="module" src="/js/start-app.js"></script>
    </body>
</html>
