<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Client Login</title>
        <link rel="stylesheet" href="/css/main.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </head>
    <body class="client-login-body">

        <start-header></start-header>

        <div class="particle-container" id="particle-canvas"></div>

        <div class="client-login-container">
            <div class="login-card">
                <div class="logo-wrapper">
                    <img class="logo-image" src="images/logo.jpg">
                </div>

                <h2>Login as User</h2>
                <p class="instruction-text">Enter your username and password to login</p>

                <div class="error-banner hidden">
                    Invalid username and / or password.<br>Please try again.
                </div>

                <form action="#" method="POST">
                    <div class="form-group">
                        <input id="user-email-login" name="user_email_login" type="email" placeholder="Email" required autocomplete="email">
                    </div>

                    <div class="form-group">
                        <input id="user-password-login" type="password" placeholder="Password" required>
                        <div class="forgot-link-container">
                            <a href="#" class="forgot-link">Forgot Password?</a>
                        </div>
                    </div>

                    <button id="login-submit" type="submit" class="global-btn">Login</button>
                </form>

                <div class="divider">Or login with</div>

                <button type="button" class="google-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
                    Login with Google
                </button>

                <p class="signup-prompt">Don't have an account? <a href="#">Register</a></p>
            </div>
        </div>
        <script type="module" src="/js/start-app.js" defer></script>
    </body>
</html>
