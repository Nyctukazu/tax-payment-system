<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PasayBiz Portal - Login as Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin/admin-style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">PasayBiz Portal</div>
        <a href="#" class="back-home">&larr; Back to Home</a>
    </header>

    <div class="particle-container" id="particle-canvas"></div>

    <main class="login-container">
        <div class="login-card">
            <div class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            </div>
            
            <h2>Login as Admin</h2>
            <p class="subtitle">Enter your admin email and password to access the dashboard</p>
            
            <form>
                <div class="input-group">
                    <input type="email" placeholder="Email" required>
                </div>
                
                <div class="input-group password-wrapper">
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="button" id="toggle-password" class="eye-btn" aria-label="Toggle password visibility">
                        <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                            <line class="slash-line" x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                </div>
                
                <div class="forgot-password-container">
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>
                
                <button type="submit" class="global-btn">Login</button>
            </form>
        </div>
    </main>

    <script type="module" src="/js/admin-app.js" defer></script>
</body>
</html>
