<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'User Access Control & Directory'">User Access Control & Directory</title>
    <link rel="stylesheet" th:href="@{/css/components/user-access.css}" href="/css/user-access.css">
    <link rel="stylesheet" th:href="@{/css/admin/admin-style.css}" href="/css/admin/admin-style.css">
</head>
<body>

    <admin-header></admin-header>
    <admin-sidebar></admin-sidebar>
<div class="users-shell">

    <main class="users-content">
        <section class="page-heading">
            <h1>USER ACCESS CONTROL & DIRECTORY</h1>
            <div class="heading-line"></div>
        </section>

        <section class="summary-grid" aria-label="User summary">
            <article class="summary-card">
                <span class="summary-label">Total System Users</span>
                <strong id="totalUsersValue" class="summary-value">0</strong>
                <p id="totalUsersNote" class="summary-note">Loading...</p>
            </article>
            <article class="summary-card">
                <span class="summary-label">Active Sessions Today</span>
                <strong id="activeSessionsValue" class="summary-value">0</strong>
                <p id="activeSessionsNote" class="summary-note">Loading...</p>
            </article>
            <article class="summary-card">
                <span class="summary-label">Security Alerts</span>
                <strong id="securityAlertsValue" class="summary-value alert-value">0</strong>
                <p id="securityAlertsNote" class="summary-note good">Loading...</p>
            </article>
        </section>

        <section class="panel">
            <div class="panel-topbar">
                <h2 class="panel-title">Current System Users</h2>
                <button id="provisionButton" type="button" class="provision-button">+ Provision New Account</button>
            </div>

            <div class="table-wrap">
                <table class="users-table" id="usersTable">
                    <thead>
                    <tr>
                        <th>Employee ID</th>
                        <th>Full Name</th>
                        <th>Corporate Email</th>
                        <th>Assigned Roles</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <section id="flashHost" class="flash-host" aria-live="polite"></section>
    </main>
</div>

<script th:inline="javascript">
    window.APP_CONFIG = {
        useMockData: /*[[${useMockData}]]*/ true,
        useMockFallback: /*[[${useMockFallback}]]*/ true,
        apiUrl: /*[[@{/api/users/access}]]*/ '/api/users/access'
    };
</script>
<script type="module" th:src="@{/js/admin-app.js}" src="/js/admin-app.js"></script>
<script type="module" th:src="@{/js/pages/user-access-page.js}" src="/js/pages/user-access-page.js"></script>
</body>
</html>
